<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storage Plus — Intake Admin</title>
  <style>
    :root {
      --navy: #152C73;
      --navy-dark: #0F2044;
      --light: #EEF1F8;
      --red: #E11D2E;
      --red-dark: #B71725;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --green: #16A34A;
      --orange: #F59E0B;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--light);
      color: var(--gray-900);
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      background: var(--navy);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(15, 32, 68, .15);
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      letter-spacing: .3px;
    }
    header .who {
      font-size: 12px;
      opacity: .85;
    }
    main {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    #generateCard { max-width: 520px; width: 100%; }
    #listCard { width: 100%; }
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(21, 44, 115, .06);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-header h2 {
      font-size: 14px;
      margin: 0;
      color: var(--navy);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .card-body { padding: 20px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 6px;
    }
    input[type=text], input[type=email], input[type=tel], textarea, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(21, 44, 115, .12);
    }
    textarea { resize: vertical; min-height: 60px; }
    .field { margin-bottom: 14px; }
    .req { color: var(--red); }
    button {
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      transition: background .15s, transform .05s;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: var(--navy);
      color: white;
      padding: 11px 18px;
      font-size: 14px;
      width: 100%;
      letter-spacing: .3px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--navy-dark); }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      padding: 6px 12px;
      font-size: 12px;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--gray-200); }
    .btn-danger {
      background: var(--red);
      color: white;
      padding: 6px 12px;
      font-size: 12px;
    }
    .btn-danger:hover:not(:disabled) { background: var(--red-dark); }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 5px 12px;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      color: var(--gray-700);
      font-weight: 600;
    }
    .chip.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    .result {
      background: var(--light);
      border: 1px solid #D6DEF0;
      border-radius: 10px;
      padding: 14px;
      margin-top: 14px;
    }
    .result label { color: var(--navy); margin-bottom: 4px; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .clear-link {
      background: transparent;
      color: var(--gray-500);
      font-size: 22px;
      line-height: 1;
      padding: 0 6px;
      border-radius: 6px;
      font-weight: 400;
    }
    .clear-link:hover { background: rgba(21,44,115,.08); color: var(--navy); }
    .url-box {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .url-box input {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      background: white;
    }
    .copy-btn {
      flex: 0 0 auto;
      background: var(--navy);
      color: white;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 12px;
    }
    .copy-btn.ok { background: var(--green); }

    .send-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .send-row a {
      flex: 1;
      text-align: center;
      padding: 8px 12px;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      text-decoration: none;
      color: var(--gray-700);
      font-size: 12px;
      font-weight: 600;
    }
    .send-row a:hover { background: var(--gray-50); border-color: var(--navy); color: var(--navy); }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--gray-500);
      font-weight: 700;
      background: var(--gray-50);
    }
    tr:hover td { background: #FBFCFE; }
    td.actions { text-align: right; white-space: nowrap; }
    td.actions button { margin-left: 4px; }

    .status-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .status-unused  { background: #DCFCE7; color: #15803D; }
    .status-used    { background: #DBEAFE; color: #1D4ED8; }
    .status-revoked { background: #FEE2E2; color: #B91C1C; }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--gray-500);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gray-900);
      color: white;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .toast.error { background: var(--red); }

    .muted { color: var(--gray-500); font-size: 12px; }
    .truncate {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .qr-wrap {
      margin-top: 12px;
      text-align: center;
    }
    .qr-wrap img {
      width: 140px; height: 140px; border: 1px solid var(--gray-200);
      border-radius: 8px; padding: 4px; background: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>Storage Plus — Intake Admin</h1>
    <div class="who" id="whoami"><?= adminEmail ?></div>
  </header>

  <main>
    <!-- ── Generate panel ─────────────────────────────────────────────── -->
    <section class="card" id="generateCard">
      <div class="card-header">
        <h2>Generate One-Time Link</h2>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Customer Name <span class="req">*</span></label>
          <input type="text" id="custName" placeholder="e.g. Jane Smith" autocomplete="off">
        </div>
        <div class="field">
          <label>Customer Email (optional)</label>
          <input type="email" id="custEmail" placeholder="jane@example.com" autocomplete="off">
        </div>
        <div class="field">
          <label>Customer Phone (optional)</label>
          <input type="tel" id="custPhone" placeholder="(555) 555-5555" autocomplete="off">
        </div>
        <div class="field">
          <label>Notes (optional)</label>
          <textarea id="custNotes" placeholder="Unit #, location, anything you want to track…"></textarea>
        </div>
        <button class="btn-primary" id="generateBtn">Generate Link</button>

        <div class="result" id="resultBox" style="display:none;">
          <div class="result-header">
            <label style="margin:0;">One-Time Intake Link</label>
            <button type="button" class="clear-link" id="clearBtn" title="Clear">&times;</button>
          </div>
          <div class="url-box">
            <input type="text" id="resultUrl" readonly>
            <button class="copy-btn" id="copyBtn" type="button">Copy</button>
          </div>
          <div class="send-row">
            <a id="emailLink" href="#" target="_blank">Email it</a>
            <a id="smsLink"   href="#" target="_blank">Text it</a>
          </div>
          <div class="qr-wrap">
            <img id="qrImg" alt="QR code">
            <div class="muted" style="margin-top:6px;">Scan to open on customer's phone</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Tokens table ───────────────────────────────────────────────── -->
    <section class="card" id="listCard">
      <div class="card-header">
        <h2>Generated Links</h2>
        <div class="filters">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="unused">Unused</button>
          <button class="chip" data-filter="used">Used</button>
          <button class="chip" data-filter="revoked">Revoked</button>
          <button class="btn-secondary" id="refreshBtn" style="margin-left:6px;">Refresh</button>
        </div>
      </div>
      <div id="listBody">
        <div class="empty">Loading…</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const INTAKE_URL = <?= JSON.stringify(intakeUrl) ?>;
    let currentFilter = "all";
    let tokens = [];

    // ── Toast ──
    function toast(msg, isError) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.toggle("error", !!isError);
      el.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove("show"), 2400);
    }

    // ── QR code (api.qrserver.com is free, reliable, and CORS-friendly) ──
    function qrUrl(text) {
      return "https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=10&data="
             + encodeURIComponent(text);
    }

    // ── Generate token ──
    document.getElementById("generateBtn").addEventListener("click", function () {
      const name  = document.getElementById("custName").value.trim();
      const email = document.getElementById("custEmail").value.trim();
      const phone = document.getElementById("custPhone").value.trim();
      const notes = document.getElementById("custNotes").value.trim();
      if (!name) { toast("Customer name is required", true); return; }

      const btn = this;
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.innerHTML = '<span class="loading"></span> Generating…';

      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled = false;
          btn.textContent = originalText;
          showResult(res);
          loadTokens();
          // Clear inputs (keep notes for context if they were typing a series)
          document.getElementById("custName").value = "";
          document.getElementById("custEmail").value = "";
          document.getElementById("custPhone").value = "";
          document.getElementById("custName").focus();
          toast("Link created");
        })
        .withFailureHandler(function (err) {
          btn.disabled = false;
          btn.textContent = originalText;
          toast(err.message || "Failed", true);
        })
        .adminCreateToken({
          customerName:  name,
          customerEmail: email,
          customerPhone: phone,
          notes:         notes,
        });
    });

    function clearResult() {
      document.getElementById("resultBox").style.display = "none";
      document.getElementById("resultUrl").value = "";
      document.getElementById("qrImg").removeAttribute("src");
    }

    document.getElementById("clearBtn").addEventListener("click", clearResult);

    // Auto-hide the previous link once you start typing a new customer's name
    document.getElementById("custName").addEventListener("input", function () {
      const box = document.getElementById("resultBox");
      if (box.style.display !== "none" && this.value.length > 0) {
        clearResult();
      }
    });

    function showResult(res) {
      const box = document.getElementById("resultBox");
      box.style.display = "block";
      const urlInput = document.getElementById("resultUrl");
      urlInput.value = res.url;

      const subj = encodeURIComponent("Storage Plus — Intake Form");
      const body = encodeURIComponent(
        "Hi " + (res.customerName || "") + ",\n\n" +
        "Please complete your Storage Plus intake form using this secure one-time link:\n\n" +
        res.url + "\n\n" +
        "If you have any trouble, give us a call.\n\nThank you,\nStorage Plus"
      );
      document.getElementById("emailLink").href = "mailto:?subject=" + subj + "&body=" + body;
      document.getElementById("smsLink").href = "sms:?&body=" + body;
      document.getElementById("qrImg").src = qrUrl(res.url);
    }

    document.getElementById("copyBtn").addEventListener("click", function () {
      const inp = document.getElementById("resultUrl");
      inp.select();
      inp.setSelectionRange(0, 99999);
      try {
        navigator.clipboard.writeText(inp.value).then(() => flashCopy(this));
      } catch (e) {
        document.execCommand("copy");
        flashCopy(this);
      }
    });
    function flashCopy(btn) {
      const orig = btn.textContent;
      btn.textContent = "Copied!";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = orig; btn.classList.remove("ok"); }, 1400);
    }

    // ── Filters ──
    document.querySelectorAll(".chip[data-filter]").forEach(c => {
      c.addEventListener("click", () => {
        document.querySelectorAll(".chip[data-filter]").forEach(x => x.classList.remove("active"));
        c.classList.add("active");
        currentFilter = c.dataset.filter;
        renderTokens();
      });
    });
    document.getElementById("refreshBtn").addEventListener("click", loadTokens);

    // ── Load tokens ──
    function loadTokens() {
      const body = document.getElementById("listBody");
      body.innerHTML = '<div class="empty">Loading…</div>';
      google.script.run
        .withSuccessHandler(function (rows) {
          tokens = rows || [];
          renderTokens();
        })
        .withFailureHandler(function (err) {
          body.innerHTML = '<div class="empty">Error: ' + (err.message || err) + '</div>';
        })
        .adminListTokens("all");
    }

    function renderTokens() {
      const body = document.getElementById("listBody");
      const filtered = currentFilter === "all"
        ? tokens
        : tokens.filter(t => String(t.status).toLowerCase() === currentFilter);

      if (filtered.length === 0) {
        body.innerHTML = '<div class="empty">No links to show.</div>';
        return;
      }

      let html = '<div class="table-wrap"><table><thead><tr>'
        + '<th>Customer</th>'
        + '<th>Status</th>'
        + '<th>Created</th>'
        + '<th>Created By</th>'
        + '<th>Used</th>'
        + '<th>Notes</th>'
        + '<th></th>'
        + '</tr></thead><tbody>';

      filtered.forEach(t => {
        const statusClass = "status-" + String(t.status).toLowerCase();
        const created = t.createdAt ? formatDate(t.createdAt) : "—";
        const used    = t.usedAt    ? formatDate(t.usedAt)    : "—";
        const canRevoke = String(t.status).toLowerCase() === "unused";
        const folderLink = t.submissionFolder
          ? '<span class="muted truncate" title="' + esc(t.submissionFolder) + '">' + esc(t.submissionFolder) + '</span>'
          : '';

        html += '<tr>'
          + '<td><div><b>' + esc(t.customerName || "—") + '</b></div>'
          + (t.customerEmail ? '<div class="muted">' + esc(t.customerEmail) + '</div>' : '')
          + (t.customerPhone ? '<div class="muted">' + esc(t.customerPhone) + '</div>' : '')
          + '</td>'
          + '<td><span class="status-pill ' + statusClass + '">' + esc(t.status) + '</span></td>'
          + '<td><div>' + created + '</div>' + (folderLink ? '<div>' + folderLink + '</div>' : '') + '</td>'
          + '<td class="muted">' + esc(t.createdBy || "—") + '</td>'
          + '<td class="muted">' + used + '</td>'
          + '<td class="muted truncate" title="' + esc(t.notes || "") + '">' + esc(t.notes || "—") + '</td>'
          + '<td class="actions">'
          + '<button class="btn-secondary" data-act="copy" data-token="' + esc(t.token) + '">Copy</button>'
          + (canRevoke ? '<button class="btn-danger" data-act="revoke" data-token="' + esc(t.token) + '">Revoke</button>' : '')
          + '</td>'
          + '</tr>';
      });
      html += '</tbody></table></div>';
      body.innerHTML = html;

      body.querySelectorAll("button[data-act]").forEach(btn => {
        btn.addEventListener("click", () => handleRowAction(btn.dataset.act, btn.dataset.token));
      });
    }

    function handleRowAction(act, token) {
      const t = tokens.find(x => x.token === token);
      if (!t) return;
      if (act === "copy") {
        navigator.clipboard.writeText(t.url).then(
          () => toast("Link copied"),
          () => toast("Copy failed", true)
        );
      } else if (act === "revoke") {
        if (!confirm("Revoke link for " + (t.customerName || "this customer") + "?\n\nThe customer will no longer be able to submit using this link.")) return;
        google.script.run
          .withSuccessHandler(() => { toast("Revoked"); loadTokens(); })
          .withFailureHandler(err => toast(err.message || "Failed", true))
          .adminRevokeToken(token);
      }
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric" })
             + " " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
      } catch (e) { return iso; }
    }
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    loadTokens();
  </script>
</body>
</html>
